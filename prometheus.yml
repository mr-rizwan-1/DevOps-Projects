global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'vm2-appserver'
    static_configs:
      - targets: ['192.168.56.11:9100']

  - job_name: 'vm1-gateway'
    static_configs:
      - targets: ['192.168.56.10:9100']

  - job_name: 'vm3-database'
    static_configs:
      - targets: ['192.168.56.12:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
